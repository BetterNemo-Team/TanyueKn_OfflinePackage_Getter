name: Check Offline Package Update

on:
  schedule:
    - cron: '0 4 * * *'   # 北京时间 12:00
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    # 不需要全局权限，直接用 PAT

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}   # 用 PAT 检出，后续推送也用这个身份

      - name: Fetch API and extract version
        id: fetch
        run: |
          API_URL="https://api-creation.codemao.cn/common/config/offline-package-search?project_name=tanyue_kn&env=production"
          RESPONSE=$(curl -s "$API_URL")
          echo "$RESPONSE" | jq .
          VERSION=$(echo "$RESPONSE" | jq -r '.tanyue_kn.version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Failed to extract version"
            exit 1
          fi
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "$RESPONSE" > api_response.json

      - name: Compare version
        id: compare
        run: |
          VERSION_FILE=".github/last_version.txt"
          NEW_VERSION="${{ steps.fetch.outputs.version }}"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "No previous version, treating as update."
            echo "update=true" >> $GITHUB_OUTPUT
          else
            OLD_VERSION=$(cat "$VERSION_FILE")
            if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
              echo "Version changed: $OLD_VERSION -> $NEW_VERSION"
              echo "update=true" >> $GITHUB_OUTPUT
            else
              echo "Version unchanged. No update."
              echo "update=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Update version record and push
        if: steps.compare.outputs.update == 'true'
        run: |
          echo "${{ steps.fetch.outputs.version }}" > .github/last_version.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last_version.txt
          git commit -m "Update tanyue_kn version to ${{ steps.fetch.outputs.version }}"
          git push

      - name: Create update issue
        if: steps.compare.outputs.update == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          token: ${{ secrets.PAT }}   # 用 PAT 创建 Issue
          title: "探月KN离线包更新: ${{ steps.fetch.outputs.version }}"
          content-filepath: api_response.json
          labels: "update,auto-generated"
